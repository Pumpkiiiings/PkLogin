# Discord: https://www.pumpkiiings.com/discord

Messages:
  Title:
    # Message sent before login
    before-login:
      title: "&a&lWELCOME!"
      subtitle: "&7Use: /login <your password>"
      delays:
        start: 0
        duration: 9999
        end: 6
    # Message sent before registration
    before-register:
      title: "&a&lWELCOME!"
      subtitle: "&7Use: /register <your password> <your password>"
      delays:
        start: 0
        duration: 9999
        end: 6
    # Message sent after login
    after-login:
      title: ""
      subtitle: "&aYou have successfully logged in!"
      delays:
        start: 0
        duration: 60
        end: 6
    # Message sent after register
    after-register:
      title: ""
      subtitle: "&aYou have successfully registered!"
      delays:
        start: 0
        duration: 60
        end: 6

        bedrock-auto-login:
        title: "&a&lWelcome!"
        subtitle: "&7Logged in as &eBedrock&7."
        delays:
          start: 0
          duration: 30
          end: 6
      premium-auto-login:
        title: "&a&lWelcome!"
        subtitle: "&7Logged in as &6Premium&7."
        delays:
          start: 0
          duration: 30
          end: 6

  delay-kick:
    # Message sent when a user takes a long time to register
    register-kick: "&cYou took too long to register."

    # Message sent when a user takes a long time to log in
    login-kick: "&cYou took too long to login."

  successful-operations:
    # Message when a user exchanges their password
    password-changed: "&aYour password has been successfully changed."

    # Message sent when a user successfully logs
    successful-login: "&aYou have successfully logged."

    # Message sent when a user successfully registers
    successful-register: "&aYou have successfully registered."

    # Message sent when a player successfully disregisters
    unregister-kick: "&cYou have successfully unregistered."

  kick-messages:
    # Message when a player tries to log on to the server with a small difference in the nickname
    nick-already-registered: "&cYou can not enter with nickname {0}&r\n&r&cThis username has already been registered as {1}&r\n&r\n&r&cTo enter, you must use your nickname without uppercase/lowercase"

    # Message sent when a user misses many times
    failed-many-times: "&cYou entered the incorrect password."

    # Message sent when password entered is incorrect
    incorrect-password: "&cIncorrect password. Please, try again."

    # Message sent when a player enters an invalid nickname.
    invalid-nickname: "&cSorry, but you are using an invalid nickname."

  error-messages:
    # Message sent when you are already logged in.
    already-login: "&cYou are already logged in."

    # Message sent when a nickname has already been registered.
    already-registered: "&cThis nickname has already been registered."

    # Message sent when a nickname has not yet been registered.
    not-registered: "&cThis nickname has not yet been registered."

    # Message sent when the entered password is not equal to the second
    passwords-dont-match: "&cPasswords are not the same."

    # Message sent when a player tries to change password by entering the same password as the current
    password-same-as-old: "&cThe password entered is the same as the current."

    # Message sent when the password entered is too large
    password-too-large: "&cThe password entered is too large."

    # Message sent when the password entered is too small
    password-too-small: "&cThe password entered is too small."
    insecure-password: "&cYour password is too weak. It must include numbers, uppercase, lowercase, and symbols."
    change-password-enforced: "&cFor security reasons, you must update your password right now using &e/changepassword&c."

    # Message when a player does not possess the required permission
    insufficient-permissions: "&cYou do not have permission to run this command."

    # Message to kick a player now online
    already-online: "&cThis player is already online."

    # Message to show that the command cannot be executed via console
    player-command-usage: "&cThis command has been disabled via console."

    # Message shown when the plugin is reloaded.
    plugin-reload-message: "&eThe plugin has been successfully reloaded."

    # Message sent when a database operation has not been successfully performed
    database-error: "&cSorry, we were unable to complete this operation. Please try again. [SQL FAIL]"

  other-messages:
    # Message sent to use the /login command
    message-login: "&eUse the command /login <password>"

    # Message sent to use the /register command
    message-register: "&eUse the command /register <password> <password>"

    # Message sent to use the /changepassword command
    message-changepassword: "&eUse the command /changepassword <current password> <new password>"

    # Message sent to use the /unregister command
    message-unregister: "&eUse the command /unregister <current password>"

    updates-failed: "&cFailed to find new updates."
    updates-download-link: "&cDownload the latest version at: https://github.com/Pumpkiiiings/PkLogin/releases"
    updates-invalid-response: "&cFailed to find new updates: invalid response."
    updates-available: "&eA new version of PkLogin is available! ({0} -> {1})"

  admin:
    help:
      - "&8&m----------------------------------------"
      - "&b&lPkLogin &8| &7Admin Help"
      - ""
      - "&b/pklogin help &8- &7Show this help message"
      - "&b/pklogin forcelogin <player> &8- &7Force login a player"
      - "&b/pklogin unregister <player> &8- &7Unregister a player"
      - "&b/pklogin changepassword <player> <password> &8- &7Change a player's password"
      - "&b/pklogin premium <player> &8- &7Set a player as premium"
      - "&b/pklogin cracked <player> &8- &7Set a player as cracked"
      - "&b/pklogin update &8- &7Update the plugin"
      - "&b/pklogin setspawn &8- &7Set the spawn location"
      - "&b/pklogin reload &8- &7Reload the configuration"
      - "&8&m----------------------------------------"
    usage-command: "&eUso correcto: &b%command% %arg%"
    forcelogin-success: "&aPlayer {0} has been forcefully authenticated."
    unregister-success: "&aPlayer {0} has been unregistered."
    changepass-success: "&aPassword for player {0} has been successfully changed."
    changepass-kick: "&cYour password was changed by an administrator."
    dupeip-header: "&eAccounts for IP/Player &a{0}&e:"
    dupeip-format: "&7- &f{0} &8(&7{1}&8)"
    dupeip-none: "&cNo accounts found for that IP/Player."
    authme-import-start: "&7Starting AuthMe import..."
    authme-import-not-found: "&cAuthMe SQLite database not found."
    authme-import-found: "&7Found AuthMe database at &f{0} &7with &f{1} &7accounts."
    authme-import-progress: "&7Progress: &f{0} &7/ &f{1}"
    authme-import-done: "&aImport complete! &7Players will be re-hashed to &f{0} &7on next login."
    authme-import-fail: "&cFailed to read AuthMe database: {0}"
    delete-success: "&aPlayer {0} has been deleted."
    setspawn-success: "&aSpawn location set successfully!"
    verify-format: 
      - "&a[PkLogin] Info for {0}:"
      - "&7IP Address: &f{1}"
      - "&7Registered: &f{2}"
      - "&7Last Login: &f{3}"
      - "&7Premium: &f{4}"
    account-not-found: "&cAccount not found."

  two-factor:
    usage: "&eUsage: /2fa <setup|verify|disable|discord|verify2fa>"
    not-registered: "&cYou must be registered to use 2FA."
    not-logged-in-setup: "&cYou must be logged in to set up 2FA."
    already-setup: "&c2FA is already set up on your account."
    setup-header: "&e--- 2FA Setup ---"
    setup-secret: "&eSecret Key: &a{0}"
    setup-instruction1: "&ePlease enter this secret into your authenticator app."
    setup-instruction2: "&eThen, verify it using: &a/2fa verify <code>"
    setup-success: "&a2FA has been successfully set up!"
    invalid-code: "&cInvalid 2FA code. Please try again."
    not-awaiting: "&cYou are not awaiting 2FA verification."
    not-logged-in-disable: "&cYou must be logged in to disable 2FA."
    not-setup: "&cYou do not have 2FA set up."
    disable-usage: "&eUsage: /2fa disable <code>"
    disable-success: "&a2FA has been successfully disabled!"
    discord-not-logged-in: "&cYou must be logged in to link Discord."
    discord-already-linked: "&cYou already have a Discord account linked."
    discord-link-header: "&e--- Discord Linking ---"
    discord-link-code: "&eCode: &a{0}"
    discord-link-instruction1: "&ePlease send a Private Message (DM) to our Discord Bot with this code."
    discord-link-instruction2: "&eThe code will expire in 10 minutes."
    login-success: "&aYou have successfully logged in with 2FA."
    login-message: "&eWe have sent a code to your Discord. Type /2fa verify2fa <code> to enter."

  offline:
    already-offline: "&cYour account is already offline (cracked)."
    success: "&aYour account is now offline! You will need to use /login."

  premium:
    already-premium: "&cYour account is already premium."
    success: "&aYour account is now Premium! You won't need to use /login."
    current-mode: "&eYour account is currently in {0} mode."
    warning: 
      - "&cWARNING!"
      - "&eIf you enable premium mode, you will enter without /login."
      - "&4If you are NOT premium, you will lose your account forever!"
      - "&eUse /premium confirm to confirm."
    auto-login: "&aYou have been automatically logged in via Premium!"

  queue:
    message: "&eYou have &b{0} &econds left to {1} or you will be kicked."

  captcha:
    required: "&cYou must complete the captcha before authenticating!"
    success: "&aCaptcha completed successfully! You can now login/register."
    failed: "&cWrong captcha! Try again."
    inventory-title: "Click the &aGreen Wool"
    inventory-item: "&aClick Me!"
    chat-instruction: "&ePlease type the following code in chat: &b{code}"
    map-instruction: "&eLook at the map in your hand and type the code!"
