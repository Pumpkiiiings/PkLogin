# Official website: https://www.pumpkiiings.com
# Discord: https://www.pumpkiiings.com/discord

# Do not change this setting
file-version: 1

# Language of the plugin.
# For more information: https://github.com/Pumpkiiiings/PkLogin/blob/master/docs/lang.md
languageFile: 'messages_en.yml'

# Security system related settings.
Security:
  # Amount of time for a player to log in/register (set in seconds).
  time-to-login: 45

  # Hashing algorithm for passwords.
  # Available options: BCRYPT (default), SHA256, SHA512, PBKDF2, ARGON2
  # - BCRYPT  : Strongest general choice. Adaptive cost factor.
  # - PBKDF2  : Widely standardized. 600,000 iterations (OWASP recommended).
  # - ARGON2  : Winner of the Password Hashing Competition. Highest security.
  # - SHA256 / SHA512 : Salted. Not recommended for new servers; kept for compatibility.
  # IMPORTANT: Changing this only affects NEW passwords. Existing hashes
  # are auto-detected and silently re-hashed on the player's next login.
  hash-algorithm: BCRYPT

  password:
    # Small password size.
    small: 5

    # Size for big passwords.
    large: 15

    secure:
      # Defines whether password strength validations should be performed.
      enable: false

      # Defines whether registered players should be required to update their passwords if their passwords do not meet the secure password pattern.
      enforce: false

      # Defines the pattern used to classify a password as secure.
      secure-regex: '(?=\S*\d)(?=\S*[A-Z])(?=\S*[a-z])(?=\S*[!@#$%^&*?])\S*$'


# Database settings
Database:
  # Available types: sqlite, mariadb, h2, mysql
  type: sqlite
  # If using sqlite and you want Velocity and Auth to share the same file, set the absolute path here:
  # Example: "C:/ruta/a/tu/servidor/plugins/pklogin/accounts.db" (Leave empty to use default)
  sqlite-file-path: ""
  host: localhost
  port: 3306
  database: pklogin
  username: root
  password: ""

# Enable this if you have PkLogin installed on your proxy (BungeeCord/Velocity).
# If true, the backend server will not perform premium checks and will let the proxy handle it.
proxy-mode: true

username-appender:
  enabled: false
  premium:
    username-appendix: ""
    position: "suffix"
    domains:
      - "premium.myserver.com"
  offline:
    username-appendix: "+"
    position: "suffix"
    domains:
      - "myserver.com"

legacy:
  # Defines the type of unique id for users.
  #
  # - Options available:
  #  |=> REAL [recommended]
  #  |=> RANDOM
  #  |=> OFFLINE
  unique-id-type: OFFLINE


# User Interface settings.
ui:
  # Sets whether on-screen messages will be sent.
  use-title-bar: true

  # Sets whether messages in actionbars will be sent.
  use-action-bar: true

# Teleport settings.
teleport:
  # Sets whether the player will be teleported to a safe position upon entering.
  safe-location: true

  # Defines if the player will be teleported to the last location upon exit.
  last-location: true

# Limbo settings.
limbo:
  # Sets whether other players should be hidden before logging in.
  hide-players-before-login: true

  # Defines whether the movement should be locked before authenticating.
  block-player-walk: true

  # Defines whether the blinding effect will be added before logging in.
  blindness-effect: false

  inventory:
    # Sets whether items should be hidden before logging in.
    hide-inventory: true

passwords:
  bruteforce:
    # Sets the maximum number of incorrect attempts a player can make.
    max-login-tries: 3

# General security settings.
security:
  captcha:
    # Enable captcha before login/register?
    enable: false
    # Type of captcha: INVENTORY, CHAT, MAP
    type: INVENTORY
    # Commands blocked before completing captcha (login, register are always blocked)
    blocked-commands: true
    
  ip-limit:
    # Sets whether the per-IP account limiter should be used.
    enable: true

    # Sets the maximum number of records per IP address.
    limit: 3

  # Sets whether the plugin should ignore the "This player is already online" check if the IP is the same as the one registered.
  # - This feature is useful if the player loses connection with the server and tries to log in again.
  bypass-online-check-with-same-address: true
