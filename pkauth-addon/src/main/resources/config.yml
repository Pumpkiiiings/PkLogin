      - " <color:#FFE300><shadow:#403900:1>/register <c> <c></shadow></color>"
      - ""
      - "<color:#FFFFFF><shadow:#404040:1>Ingresa con:</shadow></color>"
      - " <color:#FFE300><shadow:#403900:1>/login <contraseña></shadow></color>"
      - ""
      - "<color:#D3BC6F><shadow:#352F1C:1>mc.liric.xyz</shadow></color>"
  
  scoreboard-authenticated:
    title: "<u><b><color:#C8B470><shadow:#322D1C:1><u><b>AUTH</b></u></shadow></color></b></u>"
