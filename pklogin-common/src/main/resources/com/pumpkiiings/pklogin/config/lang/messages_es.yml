# Discord: https://www.pumpkiiings.com/discord

Messages:
  Title:
    # Mensagem enviada antes de logar
    before-login:
      title: "&a&l¡Bienvenido!"
      subtitle: "&7Usa: /login <contraseña>."
      delays:
        start: 0
        duration: 9999
        end: 6
    # Mensagem enviada antes de registrar
    before-register:
      title: "&a&l¡Bienvenido!"
      subtitle: "&7Usa: /register <contraseña> <contraseña>."
      delays:
        start: 0
        duration: 9999
        end: 6
    # Mensagem enviada após logar
    after-login:
      title: ""
      subtitle: "&a¡Has inicio sesión con éxito!"
      delays:
        start: 0
        duration: 30
        end: 6
    # Mensagem enviada após registrar
    after-register:
      title: ""
      subtitle: "&a¡Te has registrado con éxito!"
      delays:
        start: 0
        duration: 30
        end: 6
    # Mensagem enviada tras iniciar sesión automáticamente con Bedrock
    bedrock-auto-login:
      title: "&a&l¡Bienvenido!"
      subtitle: "&7Sesión iniciada como &eBedrock&7."
      delays:
        start: 0
        duration: 30
        end: 6
    # Mensagem enviada tras iniciar sesión automáticamente con Premium
    premium-auto-login:
      title: "&a&l¡Bienvenido!"
      subtitle: "&7Sesión iniciada como &6Premium&7."
      delays:
        start: 0
        duration: 30
        end: 6

  delay-kick:
    # Mensagem enviada quando um usuário demora muito para se registrar
    register-kick: "&cHas tardado mucho en registrarte."

    # Mensagem enviada quando um usuário demora muito para se logar
    login-kick: "&cHas tardado mucho en iniciar sesión."

  successful-operations:
    # Mensagem quando um usuário troca a sua senha
    password-changed: "&aSu contraseña ha cambiado con éxito."

    # Mensagem enviada quando um usuário loga com sucesso
    successful-login: "&aHas iniciado sesión con éxito."

    # Mensagem enviada quando um usuário se registra com sucesso
    successful-register: "&aTe has registrado con éxito."

    # Mensagem enviada quando um jogador se desregistra com sucesso
    unregister-kick: "&cRegistro cancelado con éxito."

  kick-messages:
    # Mensagem quando um jogador tenta se logar no servidor com uma pequena diferença no nick
    nick-already-registered: "&cNo podés entrar con el nick {0}&r\n&r&cEste nick ya ha sido registrado como {1}&r\n&r&r\n&r&cPara entrar, debes ingresar tu nick sin letras mayúsculas/minúsculas"

    # Mensagem enviada quando um usuário erra muitas vezes
    failed-many-times: "&cLa contraseña ingresada es incorrecta."

    # Mensagem enviada quando a senha inserida é incorreta
    incorrect-password: "&c¡Contraseña incorrecta! Vuelve a intentarlo."

  error-messages:
    # Mensaje enviado cuando ya está conectado.
    already-login: "&cYa has iniciado sesión."

    # Mensaje enviado cuando ya se ha registrado un apodo.
    already-registered: "&cEste usuario ya ha sido registrado."

    # Mensaje enviado cuando aún no se ha registrado un apodo.
    not-registered: "&cEste usuario aún no se ha registrado."

    # Mensagem enviada quando a senha inserida não é igual a segunda
    passwords-dont-match: "&cLas contraseñas no coinciden."

    # Mensagem enviada quando um jogador tenta mudar senha inserindo a mesma senha que a atual
    password-same-as-old: "&cLa contraseña introducida es la misma que la actual."

    # Mensagem enviada quando a senha inserida é muito grande
    password-too-large: "&cSu contraseña es demasiado grande. Máximo &e{0} &ccaracteres permitidos."

    # Mensagem enviada quando a senha inserida é muito pequena
    password-too-small: "&cLa contraseña introducida es muy corta."

    # Mensagem enviada caso a senha não atenda aos requisitos de segurança (regex)
    insecure-password: "&cTu contraseña es muy débil. Debe incluir números, letras mayúsculas, minúsculas y símbolos."

    # Mensagem enviada caso o jogador seja forçado a mudar a senha (enforce mode)
    change-password-enforced: "&cPor razones de seguridad, debes actualizar tu contraseña ahora mismo usando &e/changepassword&c."

    # Mensagem quando um jogador não possuí a permissão necessária
    insufficient-permissions: "&cNo tienes permiso para ejecutar este comando."

    # Mensagem para kickar um jogador já online
    already-online: "&cEste usuario ya está en línea."

    # Mensagem para mostrar que o comando não pode ser executado via console
    player-command-usage: "&cEste comando se ha inhabilitado a través de la consola."

    # Mensagem mostrada quando o plugin é recarregado
    plugin-reload-message: "&eEl plugin se ha recargado con éxito."

    # Mensaje enviado cuando una operación de base de datos no se ha realizado correctamente
    database-error: "&cLo sentimos, no pudimos completar esta operación. Inténtalo de nuevo. [SQL FAIL]"
    max-ips-reached: "&cHas alcanzado el límite máximo de cuentas registradas en esta IP."

  other-messages:
    # Mensagem enviada para o uso do comando /logar
    message-login: "&eUtilice el comando &7/login <contraseña>&e."

    # Mensagem enviada para o uso do comando /register
    message-register: "&eUtilice el comando &7/register <contraseña> <contraseña>&e."

    # Mensagem enviada para o uso do comando /mudarsenha
    message-changepassword: "&eUtilice el comando &7/changepassword <contraseña actual> <nueva contraseña>&e."

    # Mensaje enviado para usar el comando /unregister
    message-unregister: "&eUtilice el comando &7/unregister <contraseña actual>&e."

  admin:
    forcelogin-success: "&aEl jugador {0} ha sido autenticado a la fuerza."
    unregister-success: "&aEl jugador {0} ha sido desregistrado."
    changepass-success: "&aLa contraseña del jugador {0} ha sido cambiada."
    changepass-kick: "&cTu contraseña ha sido cambiada por un administrador."
    dupeip-header: "&eCuentas para la IP/Jugador &a{0}&e:"
    dupeip-format: "&7- &f{0} &8(&7{1}&8)"
    dupeip-none: "&cNo se encontraron cuentas para esa IP/Jugador."
    authme-import-start: "&7Iniciando importación de AuthMe..."
    authme-import-not-found: "&cNo se encontró la base de datos SQLite de AuthMe."
    authme-import-found: "&7Base de datos de AuthMe encontrada en &f{0} &7con &f{1} &7cuentas."
    authme-import-progress: "&7Progreso: &f{0} &7/ &f{1}"
    authme-import-done: "&a¡Importación completa! &7Los jugadores serán re-hasheados a &f{0} &7en su próximo inicio de sesión."
    authme-import-fail: "&cError al leer la base de datos de AuthMe: {0}"

  two-factor:
    usage: "&eUso: /2fa <setup|verify|disable|discord|verify2fa>"
    not-registered: "&cDebes estar registrado para usar 2FA."
    not-logged-in-setup: "&cDebes iniciar sesión para configurar el 2FA."
    already-setup: "&cEl 2FA ya está configurado en tu cuenta."
    setup-header: "&e--- Configuración 2FA ---"
    setup-secret: "&eClave secreta: &a{0}"
    setup-instruction1: "&ePor favor ingresa este código en tu app de autenticación."
    setup-instruction2: "&eLuego, verifícalo usando: &a/2fa verify <código>"
    setup-success: "&a¡El 2FA ha sido configurado correctamente!"
    invalid-code: "&cCódigo 2FA inválido. Inténtalo de nuevo."
    not-awaiting: "&cNo estás esperando verificación de 2FA."
    not-logged-in-disable: "&cDebes iniciar sesión para desactivar el 2FA."
    not-setup: "&cNo tienes configurado el 2FA."
    disable-usage: "&eUso: /2fa disable <código>"
    disable-success: "&a¡El 2FA ha sido desactivado con éxito!"
    discord-not-logged-in: "&cDebes estar logeado para vincular Discord."
    discord-already-linked: "&cYa tienes una cuenta de Discord vinculada."
    discord-link-header: "&e--- Vinculación de Discord ---"
    discord-link-code: "&eCódigo: &a{0}"
    discord-link-instruction1: "&ePor favor, envía un Mensaje Privado (DM) a nuestro Bot de Discord con este código."
    discord-link-instruction2: "&eEl código expirará en 10 minutos."
    login-success: "&aHas iniciado sesión correctamente con 2FA."
    login-message: "&eTe hemos enviado un código a Discord. Escribe /2fa verify2fa <código> para entrar."

  offline:
    already-offline: "&cTu cuenta ya es No-Premium (Cracked)."
    success: "&a¡Tu cuenta ahora es No-Premium (Cracked)! Volverás a usar /login."

  premium:
    already-premium: "&cYa eres un usuario premium."
    success: "&a¡Tu cuenta ahora es Premium! Ya no necesitarás usar /login."
    current-mode: "&eTu cuenta está actualmente en modo {0}."
    warning: 
      - "&c&l¡ADVERTENCIA CRÍTICA!"
      - "&cAl activar el modo Premium, tu UUID cambiará a tu UUID oficial de Mojang."
      - "&cEsto significa que &lPERDERÁS&c todo tu inventario, progreso, dinero e islas en modalidades que usen UUID."
      - "&cSi estás seguro y deseas continuar asumiendo este riesgo:"
      - "&eUsa /premium confirm para confirmar."
      - "&eEscribe &a/premium confirm &epara confirmar."
    auto-login: "&a¡Has iniciado sesión automáticamente vía Premium!"

  queue:
    message: "&eTienes {0} segundos para {1}!"
